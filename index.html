<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Измени свою жизнь к лучшему</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Фиксируем экран как на картинке */
        }

        /* Фоновое изображение из вашего файла */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('hero.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 5% 10%;
        }

        /* Заголовок с желтым акцентом */
        .header-title {
            font-size: 3.5vw;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .header-title span {
            color: #FFD700; /* Золотисто-желтый */
        }

        /* Подзаголовок (темный текст) */
        .header-subtitle {
            font-size: 2.8vw;
            color: #1a2a40; /* Темно-синий/черный */
            font-weight: bold;
            margin-bottom: 40px;
        }

        /* Кнопка Telegram */
        .tg-button {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(to bottom, #3a90d4, #1e70b3);
            border: 2px solid #1a65a3;
            border-radius: 15px;
            padding: 15px 30px;
            text-decoration: none;
            color: white;
            width: fit-content;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            margin-top: auto;
            margin-bottom: 15vh; /* Позиционируем кнопку ниже */
        }

        .tg-button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .tg-icon {
            background: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
        }

        .tg-icon svg {
            width: 25px;
            height: 25px;
            fill: #1e70b3;
            margin-right: 3px; /* Компенсация хвоста самолетика */
        }

        .tg-text {
            font-size: 1.8vw;
            font-weight: 500;
        }

        /* Адаптация для мобильных */
        @media (max-width: 768px) {
            .header-title { font-size: 7vw; }
            .header-subtitle { font-size: 5vw; }
            .tg-text { font-size: 4vw; }
            .container { padding: 10% 5%; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <h1 class="header-title">Ты работаешь больше — <span>получаешь меньше?</span></h1>
        <p class="header-subtitle">Решение есть — измени свою жизнь к лучшему!</p>

        <!-- Рабочая кнопка без текстовой ссылки -->
        <a href="https://t.me/psy_stas" target="_blank" class="tg-button">
            <div class="tg-icon">
                <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.14-.25.25-.5.25l.213-3.045 5.54-5.017c.24-.213-.054-.33-.373-.118l-6.85 4.312-2.944-.92c-.642-.201-.65-.642.134-.95l11.5-4.43c.532-.2.997.12.83.931z"/></svg>
            </div>
            <div class="tg-text">Напиши мне и я тебе расскажу как</div>
        </a>
    </div>

</body>
</html>
